<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Localee API — проверка</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      max-width: 560px; margin: 24px auto; padding: 0 16px; line-height: 1.5;
    }
    h1 { font-size: 20px; margin: 0 0 4px; }
    p.sub { margin: 0 0 20px; opacity: .7; font-size: 14px; }
    fieldset { border: 1px solid rgba(128,128,128,.35); border-radius: 12px; margin: 0 0 16px; padding: 14px 16px; }
    legend { padding: 0 6px; font-weight: 600; font-size: 14px; }
    label { display: block; font-size: 13px; opacity: .8; margin: 8px 0 3px; }
    input {
      width: 100%; padding: 9px 11px; border-radius: 9px; font-size: 15px;
      border: 1px solid rgba(128,128,128,.4); background: transparent; color: inherit;
    }
    button {
      margin-top: 12px; padding: 9px 16px; border: 0; border-radius: 9px; cursor: pointer;
      background: #378ADD; color: #fff; font-size: 15px; font-weight: 600;
    }
    button.ghost { background: transparent; color: inherit; border: 1px solid rgba(128,128,128,.4); }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .token { font-size: 12px; opacity: .7; word-break: break-all; margin-top: 10px; }
    pre {
      background: rgba(128,128,128,.12); border-radius: 10px; padding: 12px;
      font-size: 13px; white-space: pre-wrap; word-break: break-word; min-height: 40px;
    }
    .status { font-weight: 700; }
    .ok { color: #2e9e5b; } .bad { color: #d23c3c; }
  </style>
</head>
<body>
  <h1>Localee API — проверка 🛠️</h1>
  <p class="sub">Эта страница ходит на наш сервер по-настоящему. Заполни форму и жми кнопки — увидишь, что отвечает API.</p>

  <fieldset>
    <legend>Регистрация</legend>
    <label>Имя</label>
    <input id="reg-name" value="Эрик" />
    <label>Email</label>
    <input id="reg-email" value="erik@example.com" />
    <label>Ник (латиница)</label>
    <input id="reg-handle" value="term1x" />
    <label>Пароль (мин. 6 символов)</label>
    <input id="reg-password" value="secret123" />
    <button onclick="register()">Зарегистрироваться</button>
  </fieldset>

  <fieldset>
    <legend>Вход</legend>
    <label>Email</label>
    <input id="login-email" value="erik@example.com" />
    <label>Пароль</label>
    <input id="login-password" value="secret123" />
    <button onclick="login()">Войти</button>
  </fieldset>

  <fieldset>
    <legend>Проверка токена</legend>
    <div class="row">
      <button onclick="me()">Кто я? (GET /me)</button>
      <button class="ghost" onclick="logout()">Сбросить токен</button>
    </div>
    <div class="token" id="token-box">Токена пока нет.</div>
  </fieldset>

  <h3 style="font-size:14px;margin:0 0 6px;">Ответ сервера</h3>
  <pre id="out">— тут появится результат —</pre>

  <script>
    // Токен сохраняем в браузере, чтобы /me работал после входа.
    let token = localStorage.getItem('localee_test_token') || '';
    refreshToken();

    function refreshToken() {
      const box = document.getElementById('token-box');
      box.textContent = token ? 'Токен сохранён: ' + token.slice(0, 32) + '…' : 'Токена пока нет.';
    }

    function show(status, data) {
      const out = document.getElementById('out');
      const ok = status >= 200 && status < 300;
      out.innerHTML =
        '<span class="status ' + (ok ? 'ok' : 'bad') + '">HTTP ' + status + '</span>\n' +
        JSON.stringify(data, null, 2);
    }

    async function call(method, path, body, useToken) {
      const headers = { 'Content-Type': 'application/json' };
      if (useToken && token) headers['Authorization'] = 'Bearer ' + token;
      try {
        const res = await fetch(path, {
          method,
          headers,
          body: body ? JSON.stringify(body) : undefined,
        });
        const data = await res.json().catch(() => ({}));
        show(res.status, data);
        return { res, data };
      } catch (e) {
        show(0, { error: 'Не удалось связаться с сервером. Он запущен?' });
        return null;
      }
    }

    async function register() {
      const r = await call('POST', '/api/auth/register', {
        name: document.getElementById('reg-name').value,
        email: document.getElementById('reg-email').value,
        handle: document.getElementById('reg-handle').value,
        password: document.getElementById('reg-password').value,
      });
      if (r && r.data.token) { token = r.data.token; localStorage.setItem('localee_test_token', token); refreshToken(); }
    }

    async function login() {
      const r = await call('POST', '/api/auth/login', {
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value,
      });
      if (r && r.data.token) { token = r.data.token; localStorage.setItem('localee_test_token', token); refreshToken(); }
    }

    function me() { call('GET', '/api/auth/me', null, true); }

    function logout() {
      token = '';
      localStorage.removeItem('localee_test_token');
      refreshToken();
      show(200, { info: 'Токен сброшен' });
    }
  </script>
</body>
</html>
